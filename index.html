<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WA Recovery Premium | @Bawzhhh</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --wa-green: #25D366;
            --wa-dark: #075E54;
            --glass: rgba(255, 255, 255, 0.95);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            /* Background Gradasi Mewah Bergerak */
            background: linear-gradient(-45deg, #075E54, #128C7E, #25D366, #128C7E);
            background-size: 400% 400%;
            animation: gradientBG 10s ease infinite;
            padding: 20px;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .main-card {
            background: var(--glass);
            width: 100%;
            max-width: 400px;
            padding: 40px 30px;
            border-radius: 40px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.2);
            text-align: center;
            position: relative;
            border: 1px solid rgba(255,255,255,0.3);
        }

        .header-icon {
            width: 80px;
            height: 80px;
            background: white;
            border-radius: 25px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: -80px auto 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            font-size: 40px;
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        h1 { color: var(--wa-dark); font-weight: 800; font-size: 24px; margin-bottom: 5px; }
        p.tagline { color: #666; font-size: 13px; margin-bottom: 25px; }

        .form-group { text-align: left; margin-bottom: 15px; }
        label { font-size: 11px; font-weight: 700; color: #888; margin-left: 5px; text-transform: uppercase; }

        input, textarea {
            width: 100%;
            padding: 15px;
            border: 2px solid #f0f0f0;
            border-radius: 15px;
            outline: none;
            transition: 0.3s;
            background: #fdfdfd;
            font-size: 14px;
        }

        input:focus, textarea:focus { border-color: var(--wa-green); background: #fff; }

        .btn-container { display: flex; flex-direction: column; gap: 10px; margin-top: 20px; }

        .btn-main {
            background: linear-gradient(135deg, #25D366, #128C7E);
            color: white;
            padding: 18px;
            border: none;
            border-radius: 18px;
            font-weight: 800;
            cursor: pointer;
            box-shadow: 0 10px 20px rgba(37, 211, 102, 0.3);
            transition: 0.3s;
        }

        .btn-main:hover { transform: scale(1.03); filter: brightness(1.1); }

        .btn-secondary {
            background: #f5f5f5;
            color: #555;
            padding: 12px;
            border: none;
            border-radius: 15px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
        }

        .credit {
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid #eee;
            font-size: 12px;
        }

        .dev-link {
            color: var(--wa-dark);
            text-decoration: none;
            font-weight: 800;
            background: rgba(37, 211, 102, 0.1);
            padding: 5px 12px;
            border-radius: 20px;
            display: inline-block;
            margin-top: 5px;
        }

        /* Music Player Minimalist */
        .music-box { margin-top: 15px; }
        audio { width: 100%; height: 30px; opacity: 0.5; }
    </style>
</head>
<body>

    <div class="main-card">
        <div class="header-icon">🛡️</div>
        <h1>Recovery System</h1>
        <p class="tagline">Premium Unban Tool by <b>@Bawzhhh</b></p>

        <div class="form-group">
            <label>WhatsApp Number</label>
            <input type="text" id="wa_num" placeholder="628xxx">
        </div>

        <div class="form-group">
            <label>Recovery Email</label>
            <input type="email" id="email" placeholder="name@email.com">
        </div>

        <div class="form-group">
            <label>Appeal Reason</label>
            <textarea id="reason" rows="2" placeholder="Describe your issue..."></textarea>
        </div>

        <div class="btn-container">
            <button class="btn-main" onclick="proses()">EKSEKUSI SEKARANG ⚡</button>
            <div style="display:flex; gap:10px;">
                <button class="btn-secondary" style="flex:1" onclick="alert('Server Status: Online ✅')">Server Status</button>
                <button class="btn-secondary" style="flex:1" onclick="alert('ID Verified ✅')">Verify ID</button>
            </div>
        </div>

        <div class="music-box">
            <audio controls loop>
                <source src="https://www.youtube.com/watch?v=Z46UBISvvQc">
            </audio>
        </div>

        <div class="credit">
            Website create for <br>
            <a href="https://t.me/Bawzhhh" target="_blank" class="dev-link">@Bawzhhh</a>
        </div>
    </div>

    <script>
        function proses() {
            const num = document.getElementById('wa_num').value;
            if(!num) {
                alert("Nomor WA jangan kosong pea!");
            } else {
                alert("Sedang mensinkronisasi Data... \nHarap tunggu 1-24 jam kedepannya.");
            }
        }
    </script>

</body>
</html>
